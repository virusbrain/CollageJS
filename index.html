<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="description" content="Collage aus mehreren Fotos erstellen und in der Galerie speichern">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CollageJS">
  <title>CollageJS</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="app-header">
    <h1>CollageJS</h1>
    <p class="tagline">Fotos zusammenfügen &amp; speichern</p>
  </header>

  <main class="app-main">
    <section class="panel" aria-labelledby="images-heading">
      <h2 id="images-heading">Bilder</h2>
      <div id="image-list" class="image-list" role="list"></div>
      <label class="btn btn-primary btn-block" for="file-input">
        <span class="btn-icon" aria-hidden="true">+</span>
        Fotos hinzufügen
      </label>
      <input
        id="file-input"
        type="file"
        accept="image/*"
        multiple
        hidden
      >
      <p class="hint">2–10 Bilder für eine Collage</p>
    </section>

    <section class="panel" aria-labelledby="target-heading">
      <h2 id="target-heading">Ziel</h2>
      <div id="target-grid" class="target-grid" role="radiogroup" aria-label="Zielformat"></div>
    </section>

    <section class="panel" aria-labelledby="layout-heading">
      <h2 id="layout-heading">Layout</h2>
      <div id="layout-grid" class="layout-grid" role="radiogroup" aria-label="Collage-Layout"></div>
    </section>

    <section class="panel panel-compact" aria-labelledby="options-heading">
      <h2 id="options-heading">Optionen</h2>
      <label class="option-row">
        <span>Abstand</span>
        <input type="range" id="gap-slider" min="0" max="24" value="8" step="2">
        <output id="gap-value" for="gap-slider">8</output>
      </label>
      <label class="option-row">
        <span>Hintergrund</span>
        <input type="color" id="bg-color" value="#ffffff">
      </label>
    </section>

    <section class="panel preview-panel" aria-labelledby="preview-heading">
      <h2 id="preview-heading">Vorschau</h2>
      <p class="preview-hint">Nummern tippen = tauschen · In der Zelle wischen = Bild verschieben · Pinch = Zoom</p>
      <div id="preview-wrap" class="preview-wrap">
        <div id="preview-stage" class="preview-stage">
          <canvas id="preview-canvas" aria-label="Collage-Vorschau"></canvas>
          <div id="preview-overlay" class="preview-overlay" aria-label="Collage bearbeiten"></div>
        </div>
        <p id="preview-placeholder" class="preview-placeholder">
          Bilder hinzufügen, um die Vorschau zu sehen
        </p>
      </div>
    </section>
  </main>

  <footer class="app-footer">
    <button type="button" id="save-btn" class="btn btn-accent btn-block" disabled>
      In Fotomediathek speichern
    </button>
    <button type="button" id="share-btn" class="btn btn-secondary btn-block" disabled hidden>
      Teilen…
    </button>
    <p id="status-msg" class="status-msg" role="status" aria-live="polite"></p>
  </footer>

  <div id="install-banner" class="install-banner" hidden>
    <p>Als App installieren für schnelleren Zugriff</p>
    <button type="button" id="install-btn" class="btn btn-small">Installieren</button>
    <button type="button" id="dismiss-install" class="btn btn-small btn-ghost" aria-label="Schließen">×</button>
  </div>

  <script src="js/layouts.js" type="module"></script>
  <script src="js/collage.js" type="module"></script>
  <script src="js/app.js" type="module"></script>
</body>
</html>
